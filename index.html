<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Laporan Perpustakaan · Pengurusan Pengguna & Data Lalu</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Heroicons & Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
    * { font-family: 'Calibri', Arial, sans-serif; }
    html, body { overflow-x: hidden; }
    .gradient-blue { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .gradient-pink { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
    .gradient-cyan { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
    .gradient-green { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
    
    @media print {
      .no-print { display: none !important; }
      body { background: white !important; margin: 0; padding: 0; }
      @page { size: A4; margin: 1.8cm; }
      
      .print-section {
        page-break-inside: avoid;
        break-inside: avoid;
        display: block;
        box-sizing: border-box;
      }
      .print-section:not(:first-child) {
        page-break-before: always;
      }
      
      .print-section .chart-container,
      .print-section .ulasan-section {
        page-break-inside: avoid;
        break-inside: avoid;
      }
      
      nav, aside, .sidebar, .user-management-panel { display: none !important; }
      main { margin-left: 0 !important; padding: 0 !important; max-width: 100% !important; }
      
      .print-header { font-size: 12pt !important; font-weight: bold !important; margin-bottom: 0.1cm !important; line-height: 1.2 !important; }
      .section-title { font-size: 11pt !important; font-weight: bold !important; margin: 0.2cm 0 0.2cm !important; }
      table { page-break-inside: avoid; font-size: 9pt !important; border-collapse: collapse !important; width: 100% !important; }
      td, th { border: 1px solid black !important; padding: 0.1cm 0.15cm !important; }
      .chart-container { page-break-inside: avoid; margin: 0.3cm 0 !important; }
      .ulasan-section { page-break-inside: avoid; margin-top: 0.3cm !important; }
      textarea { border: 1px solid black !important; font-size: 9pt !important; padding: 0.2cm !important; min-height: 2cm !important; }
      * { border-radius: 0 !important; box-shadow: none !important; }
      
      /* Ensure charts print with solid colors */
      .bar { background-color: black !important; }
      .bar-value, .bar-label { color: black !important; }
    }

    /* Chart axis styling */
    .chart-with-axis {
      display: flex;
      align-items: stretch;
      margin: 1rem 0;
    }
    .y-axis {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      width: 40px;
      margin-right: 8px;
      font-size: 10px;
      color: #4b5563;
      text-align: right;
      padding-right: 4px;
      border-right: 1px solid #9ca3af;
    }
    .y-axis span {
      line-height: 1;
      transform: translateY(50%);
    }
    .bars-container {
      flex: 1;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 2rem;
      min-height: 200px;
      border-bottom: 1px solid #9ca3af;
    }
    .bar-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 60px;
    }
    .bar {
      width: 100%;
      background-color: #3b82f6;
      border-top-left-radius: 4px;
      border-top-right-radius: 4px;
      transition: height 0.2s;
    }
    .bar-label {
      font-size: 10px;
      font-weight: 500;
      margin-top: 6px;
      text-align: center;
      word-break: break-word;
      max-width: 60px;
    }
    .bar-value {
      font-size: 10px;
      font-weight: bold;
      margin-bottom: 2px;
    }

    /* User management panel */
    .user-management-panel {
      background: white;
      border-radius: 1rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useCallback, useEffect } = React;

    const MONTHS = ["JANUARI", "FEBRUARI", "MAC", "APRIL", "MEI", "JUN", "JULAI", "OGOS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DISEMBER"];

    const getPrevMonth = (month) => {
      const idx = MONTHS.indexOf(month);
      return idx > 0 ? MONTHS[idx - 1] : null;
    };

    const calculateKumulatif = (entry, month) => {
      const monthIdx = MONTHS.indexOf(month);
      let total = 0;
      for (let i = 0; i <= monthIdx; i++) {
        total += entry[MONTHS[i]] || 0;
      }
      return total;
    };

    // --- User Management ---
    const defaultUsers = [
      { username: 'admin', password: 'admin', role: 'admin' },
      { username: 'editor', password: 'editor', role: 'editor' },
      { username: 'view', password: 'view', role: 'view' }
    ];

    // Simple password check
    const checkPassword = (username, password, users) => {
      const user = users.find(u => u.username === username);
      if (!user) return false;
      return user.password === password;
    };

    function App() {
      const [users, setUsers] = useState(defaultUsers);
      const [currentUser, setCurrentUser] = useState({ username: 'admin', role: 'admin' }); // auto-login admin for demo
      const [showLogin, setShowLogin] = useState(false);
      const [loginUsername, setLoginUsername] = useState('');
      const [loginPassword, setLoginPassword] = useState('');
      const [loginError, setLoginError] = useState('');

      // For admin: user management
      const [showUserManagement, setShowUserManagement] = useState(false);
      const [newUsername, setNewUsername] = useState('');
      const [newPassword, setNewPassword] = useState('');
      const [newRole, setNewRole] = useState('view');

      const [currentView, setCurrentView] = useState('dashboard');
      const [sidebarOpen, setSidebarOpen] = useState(true);

      // Data untuk tahun lepas (2025, 2024) – cumulative values per section
      const [historicalData, setHistoricalData] = useState({
        '2025': {
          'A. PERKHIDMATAN KOLEKSI': 8500,
          'B. PINJAMAN ANTARA PERPUSTAKAAN': 45,
          'C. PUSAT WILAYAH': 1200
        },
        '2024': {
          'A. PERKHIDMATAN KOLEKSI': 7200,
          'B. PINJAMAN ANTARA PERPUSTAKAAN': 38,
          'C. PUSAT WILAYAH': 950
        }
      });

      const [dataEntries, setDataEntries] = useState([
        { id: 1, section: 'A. PERKHIDMATAN KOLEKSI', format: 1, category: 'PINJAMAN', item: 'Rak Terbuka',
          JANUARI: 532, FEBRUARI: 450, MAC: 480, APRIL: 510, MEI: 490, JUN: 520, JULAI: 540, OGOS: 500, SEPTEMBER: 530, OKTOBER: 550, NOVEMBER: 560, DISEMBER: 570 },
        { id: 2, section: 'A. PERKHIDMATAN KOLEKSI', format: 1, category: 'PINJAMAN', item: 'Course Reserve',
          JANUARI: 6, FEBRUARI: 8, MAC: 7, APRIL: 9, MEI: 8, JUN: 10, JULAI: 9, OGOS: 8, SEPTEMBER: 7, OKTOBER: 9, NOVEMBER: 8, DISEMBER: 7 },
        { id: 8, section: 'A. PERKHIDMATAN KOLEKSI', format: 1, category: 'PINJAMAN', item: 'Rak Padat',
          JANUARI: 120, FEBRUARI: 115, MAC: 130, APRIL: 125, MEI: 140, JUN: 135, JULAI: 145, OGOS: 140, SEPTEMBER: 150, OKTOBER: 155, NOVEMBER: 160, DISEMBER: 165 },
        { id: 3, section: 'A. PERKHIDMATAN KOLEKSI', format: 1, category: 'PEMULANGAN', item: 'Rak Terbuka',
          JANUARI: 1859, FEBRUARI: 1650, MAC: 1700, APRIL: 1750, MEI: 1680, JUN: 1720, JULAI: 1800, OGOS: 1760, SEPTEMBER: 1790, OKTOBER: 1820, NOVEMBER: 1850, DISEMBER: 1880 },
        { id: 9, section: 'A. PERKHIDMATAN KOLEKSI', format: 1, category: 'PEMULANGAN', item: 'Course Reserve',
          JANUARI: 45, FEBRUARI: 42, MAC: 38, APRIL: 50, MEI: 47, JUN: 52, JULAI: 49, OGOS: 55, SEPTEMBER: 53, OKTOBER: 58, NOVEMBER: 60, DISEMBER: 62 },
        { id: 10, section: 'A. PERKHIDMATAN KOLEKSI', format: 1, category: 'PEMULANGAN', item: 'Rak Padat',
          JANUARI: 210, FEBRUARI: 200, MAC: 215, APRIL: 220, MEI: 230, JUN: 225, JULAI: 240, OGOS: 235, SEPTEMBER: 250, OKTOBER: 245, NOVEMBER: 260, DISEMBER: 255 },
        { id: 4, section: 'A. PERKHIDMATAN KOLEKSI', format: 1, category: 'TEMPATAN', item: 'Rak Terbuka',
          JANUARI: 720, FEBRUARI: 700, MAC: 750, APRIL: 730, MEI: 780, JUN: 760, JULAI: 800, OGOS: 790, SEPTEMBER: 820, OKTOBER: 810, NOVEMBER: 850, DISEMBER: 840 },
        { id: 5, section: 'B. PINJAMAN ANTARA PERPUSTAKAAN', format: 2, category: '', item: 'Berjaya',
          JANUARI: 4, FEBRUARI: 5, MAC: 6, APRIL: 5, MEI: 7, JUN: 6, JULAI: 8, OGOS: 7, SEPTEMBER: 6, OKTOBER: 5, NOVEMBER: 7, DISEMBER: 6 },
        { id: 6, section: 'B. PINJAMAN ANTARA PERPUSTAKAAN', format: 2, category: '', item: 'Gagal',
          JANUARI: 2, FEBRUARI: 1, MAC: 2, APRIL: 3, MEI: 2, JUN: 3, JULAI: 2, OGOS: 3, SEPTEMBER: 2, OKTOBER: 3, NOVEMBER: 2, DISEMBER: 3 },
        { id: 7, section: 'C. PUSAT WILAYAH', format: 3, category: '', item: 'Arau', 
          colHeader1: 'BUKU', colHeader2: 'STAF', colHeader3: 'TARIKH', col1: 1520, col2: 5, col3: '12-Jan-2025' }
      ]);

      const [sectionComments, setSectionComments] = useState({});
      const updateSectionComment = (section, text) => {
        setSectionComments(prev => ({ ...prev, [section]: text }));
      };

      // Fungsi untuk menukar nama seksyen
      const renameSection = (oldName, newName) => {
        if (!newName.trim() || oldName === newName) return;
        setDataEntries(prev => prev.map(e => 
          e.section === oldName ? { ...e, section: newName } : e
        ));
        setSectionComments(prev => {
          const newComments = { ...prev };
          if (prev[oldName] !== undefined) {
            newComments[newName] = prev[oldName];
            delete newComments[oldName];
          }
          return newComments;
        });
        // Also update historical keys
        setHistoricalData(prev => {
          const newHist = { ...prev };
          ['2025', '2024'].forEach(year => {
            if (prev[year] && prev[year][oldName] !== undefined) {
              newHist[year][newName] = prev[year][oldName];
              delete newHist[year][oldName];
            }
          });
          return newHist;
        });
      };

      const addNewSection = useCallback(() => {
        const newId = Date.now();
        const newEntry = {
          id: newId, section: 'BAHAGIAN BARU', format: 1, category: 'KATEGORI', item: 'Item',
          ...Object.fromEntries(MONTHS.map(m => [m, 0]))
        };
        setDataEntries(prev => [...prev, newEntry]);
      }, []);

      const addRowToSection = useCallback((sectionName, format) => {
        const sectionEntries = dataEntries.filter(e => e.section === sectionName && e.format === format);
        const template = sectionEntries.length > 0 ? sectionEntries[0] : null;
        const newEntry = {
          id: Date.now(), section: sectionName, format: format,
          category: format === 1 ? (template?.category || 'KATEGORI') : '',
          item: 'Item Baru'
        };
        if (format === 3) {
          newEntry.colHeader1 = template?.colHeader1 || 'COL1';
          newEntry.colHeader2 = template?.colHeader2 || 'COL2';
          newEntry.colHeader3 = template?.colHeader3 || 'COL3';
          newEntry.col1 = 0; newEntry.col2 = 0; newEntry.col3 = '';
        } else {
          MONTHS.forEach(m => newEntry[m] = 0);
        }
        setDataEntries(prev => [...prev, newEntry]);
      }, [dataEntries]);

      const deleteEntry = useCallback((id) => {
        if (window.confirm('Padam entri ini?')) {
          setDataEntries(prev => prev.filter(e => e.id !== id));
        }
      }, []);

      const updateEntry = useCallback((id, field, value) => {
        setDataEntries(prev => prev.map(e => e.id === id ? { ...e, [field]: value } : e));
      }, []);

      const updateMonthValue = useCallback((id, month, value) => {
        setDataEntries(prev => prev.map(e =>
          e.id === id ? { ...e, [month]: parseFloat(value) || 0 } : e
        ));
      }, []);

      const updateFormat3Headers = useCallback((sectionName, headerNum, value) => {
        const field = `colHeader${headerNum}`;
        setDataEntries(prev => prev.map(e =>
          (e.section === sectionName && e.format === 3) ? { ...e, [field]: value } : e
        ));
      }, []);

      // Update historical cumulative for a section
      const updateHistorical = (year, section, value) => {
        setHistoricalData(prev => ({
          ...prev,
          [year]: {
            ...prev[year],
            [section]: parseFloat(value) || 0
          }
        }));
      };

      // KPI based on current year data + historical for comparison
      const currentYearTotals = useMemo(() => {
        const totals = {};
        dataEntries.forEach(entry => {
          if (entry.format !== 3) {
            const total = MONTHS.reduce((s, m) => s + (entry[m] || 0), 0);
            totals[entry.section] = (totals[entry.section] || 0) + total;
          } else {
            const total = (parseInt(entry.col1)||0) + (parseInt(entry.col2)||0);
            totals[entry.section] = (totals[entry.section] || 0) + total;
          }
        });
        return totals;
      }, [dataEntries]);

      const total2026 = Object.values(currentYearTotals).reduce((s, v) => s + v, 0);
      const total2025 = Object.values(historicalData['2025']).reduce((s, v) => s + v, 0);
      const total2024 = Object.values(historicalData['2024']).reduce((s, v) => s + v, 0);

      const percentage2025 = total2025 > 0 ? ((total2026 - total2025) / total2025 * 100).toFixed(1) : 0;
      const percentage2024 = total2024 > 0 ? ((total2026 - total2024) / total2024 * 100).toFixed(1) : 0;

      // Tabs yang dibenarkan berdasarkan role
      const allowedTabs = useMemo(() => {
        if (currentUser.role === 'view') return ['dashboard'];
        if (currentUser.role === 'editor') return ['dashboard', 'laporan-bulanan'];
        return ['dashboard', 'data-tahunan', 'laporan-bulanan']; // admin
      }, [currentUser]);

      useEffect(() => {
        if (!allowedTabs.includes(currentView)) {
          setCurrentView(allowedTabs[0]);
        }
      }, [currentUser, currentView, allowedTabs]);

      // Handle login
      const handleLogin = () => {
        const user = users.find(u => u.username === loginUsername);
        if (user && user.password === loginPassword) {
          setCurrentUser({ username: user.username, role: user.role });
          setShowLogin(false);
          setLoginError('');
          setLoginUsername('');
          setLoginPassword('');
        } else {
          setLoginError('Nama pengguna atau kata laluan salah');
        }
      };

      const handleLogout = () => {
        setCurrentUser(null);
        setShowLogin(true);
      };

      // Admin: add user
      const addUser = () => {
        if (!newUsername || !newPassword) return;
        setUsers([...users, { username: newUsername, password: newPassword, role: newRole }]);
        setNewUsername('');
        setNewPassword('');
      };

      // Admin: remove user
      const removeUser = (username) => {
        if (username === 'admin') {
          alert('Tidak boleh padam admin utama');
          return;
        }
        setUsers(users.filter(u => u.username !== username));
      };

      const organizedSections = useMemo(() => {
        const groups = {};
        dataEntries.forEach(entry => {
          if (!groups[entry.section]) groups[entry.section] = { format: entry.format, entries: [] };
          groups[entry.section].entries.push(entry);
        });
        return groups;
      }, [dataEntries]);

      // Login screen
      if (!currentUser) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-gray-100">
            <div className="bg-white p-8 rounded-xl shadow-lg w-96">
              <h2 className="text-2xl font-bold mb-6 text-center">Log Masuk</h2>
              {loginError && <p className="text-red-500 text-sm mb-3">{loginError}</p>}
              <input type="text" placeholder="Nama Pengguna" value={loginUsername}
                onChange={(e) => setLoginUsername(e.target.value)}
                className="w-full px-4 py-2 border rounded-lg mb-4" />
              <input type="password" placeholder="Kata Laluan" value={loginPassword}
                onChange={(e) => setLoginPassword(e.target.value)}
                className="w-full px-4 py-2 border rounded-lg mb-6" />
              <button onClick={handleLogin}
                className="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600">
                Log Masuk
              </button>
            </div>
          </div>
        );
      }

      const Sidebar = () => (
        <div className={`fixed left-0 top-0 h-full bg-white shadow-xl transition-all z-50 sidebar ${sidebarOpen ? 'w-64' : 'w-20'}`}>
          <div className="p-6 border-b flex justify-between items-center">
            <button onClick={() => setSidebarOpen(!sidebarOpen)} className="p-2 hover:bg-gray-100 rounded-lg">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
              </svg>
            </button>
            {sidebarOpen && <span className="font-semibold text-gray-700">Menu</span>}
          </div>
          {sidebarOpen && (
            <div className="px-4 py-2 border-b">
              <p className="text-sm text-gray-600">Pengguna: <span className="font-semibold">{currentUser.username}</span> ({currentUser.role})</p>
              {currentUser.role === 'admin' && (
                <button onClick={() => setShowUserManagement(!showUserManagement)} 
                  className="text-xs text-blue-600 mt-1 flex items-center gap-1">
                  <i className="fas fa-users-cog"></i> Urus Pengguna
                </button>
              )}
              <button onClick={handleLogout} className="text-xs text-red-600 mt-1 flex items-center gap-1">
                <i className="fas fa-sign-out-alt"></i> Log Keluar
              </button>
            </div>
          )}
          <nav className="p-4 space-y-2">
            {[
              { key: 'dashboard', label: 'Dashboard', icon: '📊' },
              { key: 'data-tahunan', label: 'Data Tahunan', icon: '📝' },
              { key: 'laporan-bulanan', label: 'Laporan Bulanan', icon: '📄' }
            ].filter(item => allowedTabs.includes(item.key)).map(item => (
              <button key={item.key} onClick={() => setCurrentView(item.key)}
                className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition ${
                  currentView === item.key ? 'bg-blue-500 text-white' : 'hover:bg-gray-100'
                }`}>
                <span>{item.icon}</span>
                {sidebarOpen && <span className="font-medium">{item.label}</span>}
              </button>
            ))}
          </nav>
        </div>
      );

      const KPICard = ({ title, value, previous, percentage, gradient, icon, year }) => (
        <div className={`rounded-2xl shadow-lg p-6 text-white ${gradient}`}>
          <div className="flex items-start justify-between mb-4">
            <div>
              <p className="text-sm opacity-90 font-medium mb-1">{title}</p>
              <h3 className="text-3xl font-bold">{value.toLocaleString()}</h3>
            </div>
            <div className="bg-white bg-opacity-20 p-3 rounded-xl">{icon}</div>
          </div>
          <div className="flex items-center gap-2 text-sm">
            <div className={`flex items-center gap-1 px-2 py-1 rounded-full ${
              percentage >= 0 ? 'bg-green-500 bg-opacity-30' : 'bg-red-500 bg-opacity-30'
            }`}>
              {percentage >= 0 ? '▲' : '▼'}
              <span className="font-semibold">{Math.abs(percentage)}%</span>
            </div>
            <span className="opacity-75">dari {year} ({previous.toLocaleString()})</span>
          </div>
        </div>
      );

      const DashboardView = () => {
        return (
          <div className="space-y-6">
            <div className="bg-white rounded-2xl shadow-sm p-6 border border-gray-100">
              <h1 className="text-2xl font-bold text-gray-800 mb-2">Dashboard Statistik</h1>
              <p className="text-gray-600">KPI BERDASARKAN BAHAGIAN · KUMULATIF 2026</p>
            </div>

            {/* Historical cumulative data editor (admin only) */}
            {currentUser.role === 'admin' && (
              <div className="bg-white rounded-2xl shadow-sm p-6 border border-gray-100">
                <h2 className="text-lg font-bold text-gray-800 mb-4">Data Kumulatif Tahun Lalu</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  {['2025', '2024'].map(year => (
                    <div key={year} className="border rounded-lg p-4">
                      <h3 className="font-semibold mb-3">Tahun {year}</h3>
                      {Object.keys(organizedSections).map(section => (
                        <div key={section} className="flex items-center gap-2 mb-2">
                          <span className="text-sm w-1/2">{section}:</span>
                          <input type="number" value={historicalData[year][section] || 0}
                            onChange={(e) => updateHistorical(year, section, e.target.value)}
                            className="w-1/2 px-2 py-1 border rounded text-sm" />
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
              </div>
            )}

            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
              <KPICard title="Jumlah Transaksi 2026" value={total2026} previous={total2025}
                percentage={parseFloat(percentage2025)} gradient="gradient-blue" year="2025"
                icon={<svg className="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z" /></svg>}
              />
              <KPICard title="A. Perkhidmatan Koleksi" value={currentYearTotals['A. PERKHIDMATAN KOLEKSI'] || 0} 
                previous={historicalData['2025']['A. PERKHIDMATAN KOLEKSI'] || 0}
                percentage={((currentYearTotals['A. PERKHIDMATAN KOLEKSI'] - (historicalData['2025']['A. PERKHIDMATAN KOLEKSI'] || 0)) / (historicalData['2025']['A. PERKHIDMATAN KOLEKSI'] || 1) * 100).toFixed(1)}
                gradient="gradient-pink" year="2025"

                            <td key={col} className="border border-black px-4 py-2 text-center">
                              {(col === selectedMonth ? grandTotalCurrent : grandTotalPrev).toLocaleString()}
                            </td>
                          ))}
                          <td className="border border-black px-4 py-2 text-center">{grandTotalCum.toLocaleString()}</td>
                        </tr>
                      )}
                      {format === 3 && (
                        <tr className="font-bold">
                          <td className="border border-black px-4 py-2">JUMLAH</td>
                          <td className="border border-black px-4 py-2 text-center">{grandTotalCurrent.toLocaleString()}</td>
                          <td className="border border-black px-4 py-2 text-center">-</td>
                          <td className="border border-black px-4 py-2 text-center">-</td>
                        </tr>
                      )}
                    </tbody>
                  </table>

                  {format === 2 && entries.length > 0 && (
                    <div className="chart-container mb-6">
                      <h3 className="text-md font-bold mb-3 text-gray-800">Graf: {sectionName} – {selectedMonth}</h3>
                      <div className="chart-with-axis">
                        <div className="y-axis">
                          {(() => {
                            const values = entries.map(i => i[selectedMonth] || 0);
                            const max = Math.max(...values, 1);
                            const ticks = [0, Math.round(max*0.25), Math.round(max*0.5), Math.round(max*0.75), max];
                            return ticks.slice().reverse().map(tick => <span key={tick}>{tick.toLocaleString()}</span>);
                          })()}
                        </div>
                        <div className="bars-container">
                          {entries.map((item) => {
                            const current = item[selectedMonth] || 0;
                            const maxVal = Math.max(...entries.map(i => i[selectedMonth] || 0), 1);
                            return (
                              <div key={item.id} className="bar-wrapper">
                                <div className="bar-value">{current.toLocaleString()}</div>
                                <div className="bar" style={{ height: `${(current/maxVal)*180}px` }}></div>
                                <div className="bar-label">{item.item}</div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                      <div className="flex justify-center mt-3 text-xs">
                        <div className="flex items-center gap-2"><div className="w-3 h-3 bg-blue-500"></div> {selectedMonth}</div>
                      </div>
                    </div>
                  )}

                  <div className="ulasan-section">
                    <h3 className="font-bold mb-2">ULASAN</h3>
                    <textarea 
                      value={sectionComments[sectionName] || ''} 
                      onChange={(e) => updateSectionComment(sectionName, e.target.value)}
                      disabled={currentUser.role === 'view'}
                      rows="3" 
                      className={`w-full border border-black p-3 rounded bg-white resize-y ${currentUser.role === 'view' ? 'bg-gray-100' : ''}`} 
                      placeholder={currentUser.role === 'view' ? 'Ulasan hanya boleh dibaca' : 'Taip ulasan...'}
                      readOnly={currentUser.role === 'view'}
                    />
                  </div>
                </div>
              );
            })}
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-gray-50">
          <Sidebar />
          <main className={`transition-all ${sidebarOpen ? 'ml-64' : 'ml-20'} p-8`}>
            <div className="max-w-7xl mx-auto">
              {currentView === 'dashboard' && <DashboardView />}
              {currentView === 'data-tahunan' && currentUser.role === 'admin' && <DataTahunanView />}
              {currentView === 'laporan-bulanan' && (currentUser.role === 'admin' || currentUser.role === 'editor') && <LaporanBulananView />}
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
